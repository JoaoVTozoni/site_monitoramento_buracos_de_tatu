name: Gerar Site Buracos de Tatu

on:
  workflow_dispatch:
    inputs:
      planilha_base64:
        description: 'Conteudo base64 da planilha'
        required: true
        type: string

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Decodificar planilha
        run: |
          mkdir -p dados
          python - <<'EOF'
          import base64, os, re
          data = os.environ["PLANILHA_B64"]
          # Remove tudo que nao e caractere base64 valido
          data = re.sub(r'[^A-Za-z0-9+/=]', '', data)
          # Adiciona padding se necessario
          missing = len(data) % 4
          if missing:
              data += '=' * (4 - missing)
          with open("dados/dados_brutos_207.xlsx", "wb") as f:
              f.write(base64.b64decode(data))
          print("Planilha decodificada com sucesso.")
          EOF
        env:
          PLANILHA_B64: ${{ github.event.inputs.planilha_base64 }}

      - name: Rodar script
        run: python gerar_site_buraco_de_tatu.py

      - name: Commitar index.html gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Atualiza site automaticamente via Actions"
          git push
