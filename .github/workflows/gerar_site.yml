name: Gerar Site Buracos de Tatu

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Baixar planilha do SharePoint
        env:
          SHAREPOINT_USER:     ${{ secrets.SHAREPOINT_USER }}
          SHAREPOINT_PASSWORD: ${{ secrets.SHAREPOINT_PASSWORD }}
          SHAREPOINT_URL:      ${{ secrets.SHAREPOINT_URL }}
        run: |
          python - <<'EOF'
          import os, requests

          user     = os.environ["SHAREPOINT_USER"]
          password = os.environ["SHAREPOINT_PASSWORD"]
          url      = os.environ["SHAREPOINT_URL"]

          session = requests.Session()
          session.auth = (user, password)

          resp = session.get(url)
          resp.raise_for_status()

          os.makedirs("dados", exist_ok=True)
          with open("dados/dados_brutos_207.xlsx", "wb") as f:
              f.write(resp.content)

          print("Planilha baixada com sucesso.")
          EOF

      - name: Rodar script
        run: python gerar_site_buraco_de_tatu.py

      - name: Commitar index.html gerado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Atualiza site automaticamente via Actions"
          git push